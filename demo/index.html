<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>docloom · Office 미리보기 데모</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  :root {
    --bg:#f4f6fb; --bg2:#eef1f8;
    --panel:#ffffff; --panel2:#f8f9fd; --line:#e3e7f0; --line2:#eceff5;
    --fg:#1c2233; --muted:#6b748c; --soft:#8a93a8;
    --accent:#5b6cff; --accent2:#8b5bff; --accentSoft:#eef0ff;
    --ok:#16a34a; --okSoft:#e8f7ee; --err:#e11d48; --errSoft:#fdecef;
    --radius:16px; --radius-sm:11px;
    --shadow-sm:0 1px 3px rgba(20,28,60,.06), 0 1px 2px rgba(20,28,60,.04);
    --shadow-md:0 8px 28px rgba(40,52,100,.10);
    --shadow-lg:0 24px 60px rgba(40,52,100,.16);
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; color:var(--fg);
    font-family:-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 480px at 88% -8%, #e7ebff 0%, transparent 60%),
      radial-gradient(760px 420px at -8% 108%, #f0e8ff 0%, transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment:fixed;
  }
  .wrap { max-width:1080px; margin:0 auto; padding:30px 24px 56px; }

  /* ───── Header ───── */
  header { display:flex; align-items:center; gap:13px; margin-bottom:26px; }
  .logo { width:42px; height:42px; display:block; flex:none;
    filter:drop-shadow(0 8px 18px rgba(91,108,255,.3)); }
  .logo svg { width:100%; height:100%; display:block; }
  header h1 { font-size:22px; margin:0; letter-spacing:-.3px; font-weight:750; }
  header h1 .loom { color:var(--accent); }

  /* ───── Idle landing (hero + drop) ───── */
  .idle { text-align:center; padding:14px 0 0; animation:rise .3s cubic-bezier(.2,.7,.2,1); }
  .hero { max-width:640px; margin:18px auto 30px; }
  .hero-title {
    font-size:31px; line-height:1.34; font-weight:780; letter-spacing:-.7px; margin:0 0 16px;
    background:linear-gradient(118deg, var(--fg) 28%, var(--accent) 88%, var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-sub { font-size:14.5px; line-height:1.65; color:var(--muted); margin:0 auto; max-width:500px; }
  .chips { display:flex; flex-wrap:nowrap; justify-content:center; gap:8px; margin:22px auto 0; }
  .chip {
    flex:none; white-space:nowrap;
    font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    padding:5px 12px; border-radius:999px; background:var(--panel); border:1px solid var(--line);
    color:var(--soft); box-shadow:var(--shadow-sm);
  }

  /* ───── Drop zone (idle) ───── */
  .drop {
    position:relative; max-width:640px; margin:0 auto;
    border:1.5px dashed #c7cee3; border-radius:var(--radius);
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    padding:38px 28px; text-align:center; cursor:pointer; transition:.2s cubic-bezier(.4,0,.2,1);
    overflow:hidden; box-shadow:var(--shadow-sm);
  }
  .drop:hover { border-color:var(--accent); box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .drop .ico {
    width:58px; height:58px; margin:0 auto 4px; border-radius:16px; display:grid; place-items:center;
    background:linear-gradient(135deg,var(--accentSoft),#f3ecff); font-size:27px; color:var(--accent);
    box-shadow:inset 0 0 0 1px rgba(91,108,255,.12);
    transition:.2s cubic-bezier(.4,0,.2,1);
  }
  .drop:hover .ico { transform:translateY(-3px) scale(1.04); }
  /* 드래그가 화면에 들어오면 드롭존을 또렷이 강조 → 동작 중임을 바로 알 수 있게. */
  .drop.dragging {
    border-style:solid; border-color:var(--accent);
    background:linear-gradient(180deg,#eef0ff,#f3ecff);
    box-shadow:0 14px 40px rgba(91,108,255,.28); transform:translateY(-3px) scale(1.012);
  }
  .drop.dragging .ico { transform:translateY(-4px) scale(1.1); }
  .drop.dragging h3 { color:var(--accent); }
  .drop h3 { margin:13px 0 5px; font-size:16px; font-weight:700; letter-spacing:-.2px; }
  .drop .sub { font-size:13px; color:var(--muted); }
  .drop .browse { color:var(--accent); font-weight:700; }
  .drop:hover .browse { text-decoration:underline; }
  .secure {
    margin-top:20px; display:inline-flex; align-items:center; gap:7px;
    font-size:11.5px; color:var(--muted); padding:5px 13px; border-radius:999px;
    background:var(--okSoft); border:1px solid #cdeed7;
  }
  .secure b { color:#15803d; font-weight:700; }
  .drop .err {
    margin-top:16px; display:none; font-size:12.5px; color:var(--err); font-weight:650;
  }
  input[type=file]{ display:none; }

  @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ───── Quick Look 팝업 (맥 스페이스바 미리보기 스타일) ───── */
  /* 배경은 블러 없이 불투명 딤(backdrop-filter 는 그 위에서 스크롤할 때마다 재계산돼 버벅임의 주범). */
  .ql-overlay {
    position:fixed; inset:0; z-index:60; display:none;
    align-items:center; justify-content:center;
    padding:clamp(18px, 4vw, 60px);
    background:rgba(14,18,34,.62);
  }
  .ql-overlay.on { display:flex; }
  /* 드롭존 위치에서 펼쳐지고(열기)·다시 줄어드는(닫기) transform 은 JS 가 좌표를 계산해 지정.
     transform+opacity 만 쓰므로 컴포지터에서 처리돼 파싱 중에도 매끄럽다. */
  .ql-panel {
    display:flex; flex-direction:column;
    width:min(1080px, 100%); height:100%; min-height:0;
    border-radius:14px; overflow:hidden; background:var(--panel);
    box-shadow:0 40px 100px rgba(8,12,35,.5), 0 0 0 1px rgba(255,255,255,.05);
    will-change:transform, opacity;
    transition:transform .3s cubic-bezier(.2,.85,.25,1), opacity .24s ease;
  }

  /* 슬림 툴바: 파일명 + 액션 + 닫기 */
  .ql-bar { display:flex; align-items:center; gap:10px; padding:9px 12px; flex:none;
    background:#f8f9fd; border-bottom:1px solid var(--line2); }
  .badge { font-size:10.5px; padding:4px 10px; border-radius:999px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; flex:none; }
  .badge.docx{ background:#e4edff; color:#2f6bdb; } .badge.pptx{ background:#ffe7ec; color:#d6446a; }
  .badge.xlsx{ background:#e1f6ec; color:#168a52; } .badge.q{ background:#eceff5; color:#8a93a8; }
  .badge.csv{ background:#e6f7f0; color:#0d8a5f; } .badge.pdf{ background:#ffe7e7; color:#d6342c; }
  .badge.hwpx, .badge.hwp{ background:#eef0ff; color:#5b6cff; }
  .badge.doc{ background:#e4edff; color:#2f6bdb; } .badge.ppt{ background:#ffe7ec; color:#d6446a; }
  .badge.xls{ background:#e1f6ec; color:#168a52; }
  .badge.html{ background:#fdeede; color:#c2680c; } .badge.md{ background:#eef3fb; color:#4b5563; }
  .badge.txt{ background:#eef1f4; color:#566072; }
  .badge.rtf{ background:#fdeede; color:#c2680c; }
  .fname { color:var(--fg); font-weight:650; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .msg { font-size:12.5px; flex:none; }
  .msg.ok { color:var(--ok); font-weight:650; } .msg.err { color:var(--err); font-weight:650; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #d7dcec;
    border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .ql-bar .grow { margin-left:auto; }
  .ghostbtn {
    height:30px; padding:0 13px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-size:12px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; transition:.15s; flex:none;
  }
  .ghostbtn:hover { color:var(--accent); border-color:#cfd6ff; background:var(--accentSoft); }

  .stage-act { display:flex; gap:8px; flex:none; }
  .ql-close { width:30px; height:30px; flex:none; border-radius:8px; cursor:pointer;
    border:1px solid var(--line); background:var(--panel); color:var(--muted);
    font-size:14px; display:grid; place-items:center; transition:.15s; }
  .ql-close:hover { color:var(--err); border-color:#f3c6cf; background:var(--errSoft); }
  iframe { width:100%; flex:1 1 auto; min-height:0; border:0; background:#fff; display:block; }
  .ghostbtn.rt-btn { color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; }
  .ghostbtn.rt-btn:hover { filter:brightness(1.06); color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); }
  #editorWrap { background:#fff; flex:1 1 auto; min-height:0; flex-direction:column; }
  .edit-hint { padding:10px 16px; font-size:12px; color:var(--muted); background:var(--accentSoft);
    border-bottom:1px solid var(--line2); flex:none; }
  .edit-hint b { color:var(--accent); }
  #editor { flex:1 1 auto; min-height:0; overflow:auto; padding:24px 28px; outline:0; font-size:14px; line-height:1.7;
    color:var(--fg); background:#fff; }
  #editor table { border-collapse:collapse; margin:8px 0; }
  #editor td, #editor th { border:1px solid #d6d9dd; padding:4px 8px; }
  #editor [data-frozen], #editor [data-frozen-run] { background:#eef0ff; color:#5b6cff; border-radius:4px; padding:0 4px; }
  #editor section { border:1px dashed #d6d9dd; border-radius:8px; padding:12px 14px; margin:0 0 14px; }
  /* 한글(.hwp/.hwpx) 편집기: 미리보기(흰 종이)와 비슷하게 — 회색 배경 위 중앙 종이 시트.
     셀 테두리/정렬/글자색은 hwpToEditableHtml 이 인라인 스타일로 넣으므로 여기선 종이 틀만. */
  #editor:has(.hwp-edit) { background:#eceef0; padding:24px 0; }
  .hwp-edit { max-width:820px; margin:0 auto; background:#fff; padding:40px 44px; box-sizing:border-box;
    box-shadow:0 1px 4px rgba(0,0,0,.12),0 8px 24px rgba(0,0,0,.08);
    font-family:'맑은 고딕','Malgun Gothic','Apple SD Gothic Neo',sans-serif; line-height:1.5; }
  .hwp-edit .hp-tbl, .hwp-edit .hwp-tbl { border-collapse:collapse; max-width:100%; }
  .hwp-edit .hp-tbl td { vertical-align:middle; word-break:break-word; }
  /* 페이지 경계 표시(편집불가·시각 전용). 흰 시트 좌우 패딩 밖까지 선을 늘린다. */
  .hwp-edit .hwp-pagebreak { text-align:center; color:#aab1bb; font-size:11px; user-select:none;
    margin:20px -44px 16px; border-top:1px dashed #c7ccd3; padding-top:5px; }
  /* 머리말/꼬리말: 본문과 구분되는 옅은 박스 + 라벨. 안쪽 문단 div 는 그대로 편집 가능. */
  .hwp-edit .hwp-hf { border:1px dashed #c7ccd3; border-radius:6px; background:#fafbfc;
    padding:6px 12px 8px; margin:0 0 16px; }
  .hwp-edit .hwp-hf[data-hf-kind="footer"] { margin:18px 0 0; }
  .hwp-edit .hwp-hf-label { display:block; font-size:10px; color:#9aa1ab; user-select:none; margin-bottom:2px; }

  code { background:var(--panel); padding:2px 7px; border-radius:6px; border:1px solid var(--line); color:var(--muted); }

  /* ───── 드래그 표시 (전체 화면 색은 그대로, 가운데 카드만 노출) ───── */
  .veil {
    position:fixed; inset:0; z-index:80; display:none; place-items:center;
    background:transparent; pointer-events:none;
  }
  .veil.on { display:grid; }
  .veil-card {
    padding:18px 26px; border-radius:14px; border:2px dashed var(--accent);
    background:#fff; box-shadow:var(--shadow-lg);
    font-size:15px; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:10px;
    animation:rise .18s cubic-bezier(.2,.7,.2,1);
  }
  .veil-card .vi { font-size:22px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#5b6cff"/><stop offset="1" stop-color="#8b5bff"/></linearGradient></defs>
        <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#lg)"/>
        <path d="M19 13 H39 L47 21 V49 q0 2 -2 2 H19 q-2 0 -2 -2 V15 q0 -2 2 -2 Z" fill="#fff"/>
        <path d="M39 13 L47 21 H39 Z" fill="#cdd5ff"/>
        <g stroke="#5b6cff" stroke-width="2.6" stroke-linecap="round">
          <line x1="23" y1="24" x2="43" y2="24"/><line x1="23" y1="31" x2="43" y2="31"/>
          <line x1="23" y1="38" x2="43" y2="38"/><line x1="23" y1="45" x2="40" y2="45"/></g>
        <rect x="32" y="20" width="4" height="29" rx="2" fill="url(#lg)"/>
        <g stroke="#5b6cff" stroke-width="2.6" stroke-linecap="round">
          <line x1="23" y1="24" x2="43" y2="24"/><line x1="23" y1="38" x2="43" y2="38"/></g>
      </svg>
    </span>
    <h1><span class="doc">doc</span><span class="loom">loom</span></h1>
  </header>

  <!-- IDLE: hero landing + drop zone -->
  <div class="idle" id="idle">
    <div class="hero">
      <h2 class="hero-title">양식 그대로, 브라우저 안에서<br />Office 문서를 미리보고 편집하세요</h2>
      <p class="hero-sub">서버 업로드 없이 문서를 원문 그대로 렌더링하고, 편집한 뒤 같은 포맷·양식으로 복원합니다.</p>
      <div class="chips">
        <span class="chip">docx</span><span class="chip">pptx</span><span class="chip">xlsx</span>
        <span class="chip">pdf</span><span class="chip">hwpx</span><span class="chip">csv</span>
        <span class="chip">html</span><span class="chip">md</span><span class="chip">txt</span>
      </div>
    </div>
    <div class="drop" id="drop">
      <div class="ico">⬆</div>
      <h3>파일을 끌어다 놓으세요</h3>
      <div class="sub">또는 <span class="browse">클릭해서 선택</span></div>
      <div class="err" id="dropErr"></div>
    </div>
    <div class="secure">🔒 <b>100% 브라우저 내 처리</b> — 파일이 서버로 업로드되지 않습니다.</div>
  </div>

  <!-- ACTIVE: Quick Look 팝업 (바깥 여백·ESC·✕ 로 닫힘) -->
  <div class="ql-overlay" id="overlay">
    <div class="ql-panel" id="panel">
      <div class="ql-bar">
        <span id="badge" class="badge q">?</span>
        <span class="fname" id="fname"></span>
        <span class="msg" id="msg"></span>
        <span class="grow"></span>
        <div class="stage-act">
          <button class="ghostbtn" id="editBtn" title="HTML 로 편집 후 원본 포맷으로 복원" style="display:none">✏️ 편집 &amp; 복원</button>
          <button class="ghostbtn" id="previewBtn" title="미리보기로 돌아가기" style="display:none">← 미리보기</button>
          <button class="ghostbtn rt-btn" id="restoreBtn" title="편집 내용을 원본 확장자로 복원·다운로드" style="display:none">⬇ 복원 다운로드</button>
          <button class="ghostbtn rt-btn" id="savePdfBtn" title="미리보기에서 수정한 글자를 새 PDF로 저장" style="display:none">⬇ PDF로 저장</button>
          <button class="ghostbtn" id="morePagesBtn" title="다음 페이지를 이어서 불러오기" style="display:none">⬇ 더보기</button>
          <button class="ghostbtn" id="saveHtmlBtn" title="변환된 미리보기를 HTML 파일로 저장">⬇ 저장</button>
          <button class="ghostbtn" id="newtab" title="새 탭에서 열기">⤢ 새 탭</button>
        </div>
        <button class="ql-close" id="closeBtn" title="닫기 (Esc)">✕</button>
      </div>
      <iframe id="frame" sandbox="allow-scripts allow-same-origin"></iframe>
      <!-- 편집 모드: encode 로 뽑은 편집용 HTML 을 직접 고치고 decode 로 원본 포맷 복원 -->
      <div id="editorWrap" style="display:none">
        <div class="edit-hint">아래 내용을 직접 수정한 뒤 <b>복원 다운로드</b>를 누르면 원본 확장자·양식을 유지한 채 저장됩니다. (LLM 자리에 사람이 편집하는 것과 동일)</div>
        <div id="editor" contenteditable="true" spellcheck="false"></div>
      </div>
    </div>
  </div>

  <input type="file" id="file" accept=".docx,.doc,.pptx,.ppt,.xlsx,.xls,.csv,.pdf,.hwpx,.hwp,.html,.htm,.md,.markdown,.txt,.rtf" />
</div>

<!-- Full-page drag veil -->
<div class="veil" id="veil">
  <div class="veil-card"><span class="vi">📄</span> 여기에 놓으면 미리보기</div>
</div>

<script type="module">
  // ?v= 캐시버스터 — 번들 재빌드 후 브라우저가 옛 파일을 안 쓰도록(하드리로드 불필요).
  import { previewHtml, adapterFor, encode, decode, editablePreviewHtml, formatFromFilename,
           extractPdfModel, pdfModelToPreviewHtml, buildPdfFromModel,
           extendPdfModel, pdfModelPagesHtml, pdfModelTotalPages, pdfModelFontFaceCss,
           hwpToEditableHtml, applyHwpEdits, hwpToSvgPreviewHtml, hwpToTreePreviewHtml } from "./docloom.mjs?v=20260609docxwebfont";
  // 한글(.hwp/.hwpx) 충실 렌더 — rhwp(Rust+WASM, 소스빌드 vendor/rhwp) 의 절대배치 HTML 렌더.
  import rhwpInit, { HwpDocument } from "./rhwp.js?v=20260602fixes";

  let rhwpReady = null;
  function ensureRhwp() {
    if (!rhwpReady) {
      // WASM 내부 텍스트 레이아웃 계산에 필요한 폭 측정 콜백(브라우저 canvas).
      let ctx = null, lastFont = "";
      globalThis.measureTextWidth = (font, text) => {
        if (!ctx) ctx = document.createElement("canvas").getContext("2d");
        if (font !== lastFont) { ctx.font = font; lastFont = font; }
        return ctx.measureText(text || "").width;
      };
      rhwpReady = rhwpInit({ module_or_path: "./rhwp_bg.wasm?v=20260602fixes" });
    }
    return rhwpReady;
  }
  // 한글 바이트 → 미리보기 HTML. **흐름배치(tree) 주 경로** — 중첩표(표 안의 표)·셀 안 이미지까지
  // 내용 완전하게 렌더. (SVG 충실 렌더 hwpToSvgPreviewHtml 는 픽셀은 정확하나 이미지·중첩표를
  // 누락하는 회귀가 있어 기본값에서 제외 — 그 누락 수정 후 충실 전환 예정.)
  // 엔진 수정(글뒤 그림·페이지네이션)은 WASM 에 반영돼 렌더트리 좌표에도 적용된다.
  async function renderHangul(bytes, name) {
    await ensureRhwp();
    const doc = new HwpDocument(bytes);
    return hwpToTreePreviewHtml(doc, { title: name, rawBytes: bytes });
  }

  const $ = (id) => document.getElementById(id);
  const idle = $("idle"), drop = $("drop"), dropErr = $("dropErr"), fileInput = $("file"),
        overlay = $("overlay"), panel = $("panel"), badge = $("badge"), fname = $("fname"), msg = $("msg"),
        closeBtn = $("closeBtn"), frame = $("frame"),
        newtab = $("newtab"), saveHtmlBtn = $("saveHtmlBtn"), veil = $("veil"),
        editBtn = $("editBtn"), previewBtn = $("previewBtn"), restoreBtn = $("restoreBtn"),
        savePdfBtn = $("savePdfBtn"), morePagesBtn = $("morePagesBtn"),
        editorWrap = $("editorWrap"), editor = $("editor");

  const PDF_PAGE_CHUNK = 20;  // PDF 미리보기 초기에 그리는 페이지 수
  const PDF_MORE_CHUNK = 10;  // "더보기" 한 번에 더 그리는 페이지 수

  let lastHtml = null;
  let lastFrameUrl = null;  // 한글 Blob URL(누수 방지용 추적)
  // 편집/복원용 현재 파일 상태
  let curBytes = null, curName = "", curFmt = "?", curManifest = null, canRoundtrip = false;
  let pdfModel = null;  // PDF 편집 모델(미리보기 글자 수정 → 새 PDF)
  let directEdit = null; // docx·csv: 미리보기에서 바로 편집({manifest,format})
  let curHwpDoc = null;  // 한글(.hwp/.hwpx): rhwp HwpDocument 편집 인스턴스(표 셀까지 편집)

  function showPreviewMode() {
    frame.style.display = "block";
    editorWrap.style.display = "none";
    previewBtn.style.display = "none";
    // 직접편집(docx·csv)은 미리보기 자체가 편집화면 → 편집 토글 숨기고 저장만 노출.
    restoreBtn.style.display = directEdit ? "inline-flex" : "none";
    editBtn.style.display = (canRoundtrip && !directEdit) ? "inline-flex" : "none";
    savePdfBtn.style.display = pdfModel ? "inline-flex" : "none";
    // PDF 는 'PDF로 저장' 이 따로 있으니 일반 HTML 저장 버튼은 숨겨 중복 방지.
    saveHtmlBtn.style.display = pdfModel ? "none" : "inline-flex";
    updateMorePagesBtn();
  }

  // PDF 에 아직 안 그린 페이지가 남았으면 "더보기" 노출(남은 수 표시).
  function updateMorePagesBtn() {
    if (!pdfModel) { morePagesBtn.style.display = "none"; return; }
    const remaining = pdfModelTotalPages(pdfModel) - pdfModel.pages.length;
    if (remaining > 0) {
      morePagesBtn.style.display = "inline-flex";
      const next = Math.min(PDF_MORE_CHUNK, remaining);
      morePagesBtn.textContent = `⬇ ${next}쪽 더보기 (남은 ${remaining}쪽)`;
    } else {
      morePagesBtn.style.display = "none";
    }
  }

  function setBadge(fmt) {
    badge.className = "badge " + (["docx","pptx","xlsx","doc","ppt","xls","csv","pdf","hwpx","hwp","html","md","txt"].includes(fmt) ? fmt : "q");
    badge.textContent = fmt ?? "?";
  }

  // 드롭존 중심으로 패널을 축소·이동시키는 transform 문자열(펼침의 시작 = 닫힘의 끝 상태).
  function panelFromDropTransform() {
    const d = drop.getBoundingClientRect();
    const p = panel.getBoundingClientRect();
    const tx = (d.left + d.width / 2) - (p.left + p.width / 2);
    const ty = (d.top + d.height / 2) - (p.top + p.height / 2);
    const s = Math.max(0.12, Math.min(0.6, d.width / p.width));
    return `translate(${tx}px, ${ty}px) scale(${s})`;
  }

  // 열기: 드롭존 위치/크기에서 시작해 전체 패널로 펼침. 펼침이 끝나면 resolve
  // → 무거운 파싱/렌더는 그 뒤에 시작해 애니메이션과 겹치지 않게 한다(끊김 방지).
  function openQuickLook() {
    return new Promise((resolve) => {
      overlay.classList.add("on");               // display:flex → 패널 크기 측정 가능
      document.body.style.overflow = "hidden";   // 배경 스크롤 잠금
      panel.style.transition = "none";           // 시작 상태는 애니메이트 없이 즉시 세팅
      panel.style.transform = panelFromDropTransform();
      panel.style.opacity = "0";
      void panel.offsetWidth;                    // 강제 리플로우로 시작 상태 커밋
      let settled = false;
      const onEnd = (e) => {
        if (e && e.propertyName !== "transform") return;
        if (settled) return; settled = true;
        clearTimeout(fb);
        panel.removeEventListener("transitionend", onEnd);
        resolve();
      };
      requestAnimationFrame(() => {
        panel.addEventListener("transitionend", onEnd);
        panel.style.transition = "";             // 다음 프레임에 목표 상태로 → transition 재생
        panel.style.transform = "";
        panel.style.opacity = "";
      });
      const fb = setTimeout(onEnd, 420);         // transitionend 누락 대비
    });
  }

  // 닫기: 펼침의 역재생 — 드롭존 자리로 줄어들며 사라진 뒤 오버레이 제거.
  let closing = false;
  function closeQuickLook() {
    if (closing || !overlay.classList.contains("on")) return;
    closing = true;
    panel.style.transition = "";   // CSS transition 사용
    panel.style.transform = panelFromDropTransform();
    panel.style.opacity = "0";
    let finished = false;
    const done = (e) => {
      if (e && e.propertyName !== "transform") return;  // transform 끝날 때만
      if (finished) return;
      finished = true;
      clearTimeout(fallback);
      panel.removeEventListener("transitionend", done);
      closing = false;
      overlay.classList.remove("on");
      document.body.style.overflow = "";
      panel.style.transition = "none";
      panel.style.transform = "";
      panel.style.opacity = "";
      if (lastFrameUrl) { URL.revokeObjectURL(lastFrameUrl); lastFrameUrl = null; }
      frame.removeAttribute("src");
      frame.removeAttribute("srcdoc");
    };
    panel.addEventListener("transitionend", done);
    const fallback = setTimeout(done, 400);  // transitionend 누락 대비(.3s + 여유)
  }

  async function handleFile(file) {
    if (!file) return;
    dropErr.style.display = "none";
    fname.textContent = file.name;
    setBadge("?");
    msg.className = "msg";
    msg.innerHTML = '<span class="spinner"></span>';
    // 펼치는 동안엔 빈 패널(가벼움) — 이전 미리보기 내용 제거 후 펼침이 끝나길 기다린다.
    if (lastFrameUrl) { URL.revokeObjectURL(lastFrameUrl); lastFrameUrl = null; }
    frame.removeAttribute("src"); frame.removeAttribute("srcdoc");
    editorWrap.style.display = "none"; frame.style.display = "block";
    await openQuickLook();                       // 펼침 완료까지 대기(애니메이션 단독 실행)
    await new Promise((r) => setTimeout(r, 0));   // 펼침 후 한 틱 양보 → 그 다음 무거운 처리
    try {
      const bytes = new Uint8Array(await file.arrayBuffer());
      let fmt = "?";
      canRoundtrip = false;
      // 확장자 힌트 — 평문(csv/html/md/txt)은 매직으로 구분되지 않아 확장자로 정확히 라우팅.
      const hint = formatFromFilename(file.name);
      try { const ad = adapterFor(bytes, hint); fmt = ad.id; canRoundtrip = !!ad.supportsRoundTrip; } catch {}
      // 한글=rhwp 충실렌더, PDF=글자 편집가능 미리보기, docx·csv=미리보기에서 바로 편집,
      // 나머지=docloom 미리보기(+편집&복원 토글).
      const isHangul = (fmt === "hwp" || fmt === "hwpx");
      const isPdf = (fmt === "pdf");
      // 문서형 왕복 포맷은 "미리보기에서 바로 편집"(보던 화면 그대로 수정→복원).
      // encode 본문이 .docloom-doc 계열이라 미리보기 CSS가 입혀져 보기≈편집이 된다.
      // pptx·xlsx 는 슬라이드/시트 전용 렌더라 제외(리치 미리보기 유지), hwp/hwpx·pdf 는 전용 편집 경로.
      // ⚠ html 제외: html 의 encode 출력은 docloom 마크업이 아니라 문서 자신의 임의 HTML 이라,
      //    직접편집 셸(.docloom-doc 용지 CSS)에 끼우면 원본 <head>/<style> 이 사라져 이상하게 보인다.
      //    → faithful previewHtml(원본 그대로 자기 CSS)로 미리보고, 편집은 md 처럼 "편집&복원" 토글로.
      // docx 는 충실 미리보기(docxToPreviewHtml: 원본 글꼴·크기·색·글머리표·번호·머리말)로 보여주고,
      // 편집은 다른 충실미리보기 포맷처럼 "편집&복원" 토글(encode→수정→decode)로 분리한다.
      const isDirectEdit = ["csv", "doc", "txt"].includes(fmt);
      pdfModel = null; directEdit = null;
      let html;
      if (isPdf) {
        // PDF: 추출 모델을 편집가능(글자 contenteditable) 미리보기로. 모델을 보관해 저장 시 재생성.
        pdfModel = extractPdfModel(bytes, { maxPages: PDF_PAGE_CHUNK });
        html = pdfModelToPreviewHtml(pdfModel, { title: file.name, editable: true });
      } else if (isDirectEdit) {
        // 편집채널을 미리보기 스타일+contenteditable 로 → 그 화면에서 바로 수정.
        // 평문(csv·html·txt)은 매직으로 구분 안 되니 판별된 fmt 를 어댑터 힌트로 넘긴다.
        const ep = editablePreviewHtml(bytes, { title: file.name, format: fmt });
        directEdit = { manifest: ep.manifest, format: ep.format };
        html = ep.html;
      } else if (isHangul) {
        html = await renderHangul(bytes, file.name);
      } else {
        html = previewHtml(bytes, { title: file.name, format: hint });
      }
      lastHtml = html;
      // 한글·PDF·직접편집·docx(이미지 많을 수 있음)는 내용이 커질 수 있어 srcdoc 대신
      // Blob URL(잘림 방지). 모두 same-origin 이라 부모가 iframe 내용을 읽을 수 있다.
      if (lastFrameUrl) { URL.revokeObjectURL(lastFrameUrl); lastFrameUrl = null; }
      if (isHangul || isPdf || isDirectEdit || fmt === "docx") {
        frame.removeAttribute("srcdoc");
        lastFrameUrl = URL.createObjectURL(new Blob([html], { type: "text/html" }));
        frame.src = lastFrameUrl;
      } else {
        frame.removeAttribute("src");
        frame.srcdoc = html;
      }
      // 편집/복원 상태 저장
      curBytes = bytes; curName = file.name; curFmt = fmt; curManifest = null; curHwpDoc = null;
      setBadge(fmt);
      showPreviewMode();
      // 렌더 완료 상태문구는 표시하지 않는다(액션 버튼이 가능 동작을 이미 안내).
      msg.className = "msg";
      msg.innerHTML = "";
    } catch (e) {
      // 에러 → 팝업 닫고 idle 드롭존에 메시지 노출
      lastHtml = null;
      closeQuickLook();
      dropErr.style.display = "block";
      dropErr.textContent = "✗ " + (e?.message ?? e);
    }
  }

  // 파일 선택
  drop.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
    fileInput.value = "";  // 같은 파일 다시 선택 가능
  });

  // 닫기: ✕ 버튼 / 바깥 여백 클릭 / ESC (맥 Quick Look 처럼)
  closeBtn.addEventListener("click", closeQuickLook);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeQuickLook(); });
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("on")) closeQuickLook();
  });

  // 새 탭에서 미리보기 열기
  newtab.addEventListener("click", () => {
    if (!lastHtml) return;
    const blob = new Blob([lastHtml], { type:"text/html" });
    window.open(URL.createObjectURL(blob), "_blank");
  });

  // 변환된 미리보기를 .html 파일로 다운로드. iframe 에 접근 가능하면 화면 그대로(편집 반영)를,
  // 아니면 최초 변환 HTML(lastHtml)을 저장한다.
  saveHtmlBtn.addEventListener("click", () => {
    let html = lastHtml;
    try {
      const idoc = frame.contentDocument;
      if (idoc && idoc.documentElement) html = "<!DOCTYPE html>\n" + idoc.documentElement.outerHTML;
    } catch {}
    if (!html) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
    a.download = (curName || "preview").replace(/\.[^.]+$/, "") + ".html";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // 편집 모드: 문서 → 편집용 HTML(encode) 을 직접 고치고 → 원본 포맷(decode) 복원
  editBtn.addEventListener("click", async () => {
    if (!curBytes) return;
    try {
      if (curFmt === "hwp" || curFmt === "hwpx") {
        // 한글: rhwp 로 표 셀까지 펼친 편집 HTML. (.hwp 는 네이티브 .hwp 복원, .hwpx 는 .hwpx)
        // curHwpDoc 가 이미 있으면(편집↔미리보기 토글) 재생성하지 않는다 — 이전 편집을 보존.
        await ensureRhwp();
        if (!curHwpDoc) curHwpDoc = new HwpDocument(curBytes);
        editor.innerHTML = hwpToEditableHtml(curHwpDoc);
      } else {
        const { html, manifest } = encode(curBytes, { format: curFmt });
        curManifest = manifest; curHwpDoc = null;
        editor.innerHTML = html;          // 편집용 HTML 그대로 (data-* 식별자 포함)
      }
      frame.style.display = "none";
      editorWrap.style.display = "flex";
      editBtn.style.display = "none";
      previewBtn.style.display = "inline-flex";
      restoreBtn.style.display = "inline-flex";
    } catch (e) {
      msg.className = "msg err"; msg.textContent = "✗ 편집 변환 실패: " + (e?.message ?? e);
    }
  });

  // 미리보기로 복귀. 한글은 편집 내용을 문서에 반영하고 미리보기를 다시 그려 수정이 보이게 한다.
  previewBtn.addEventListener("click", () => {
    if (curHwpDoc) {
      try {
        applyHwpEdits(curHwpDoc, editor.innerHTML);   // 편집 → 문서 반영(멱등: 이미 반영분은 0건)
        const html = hwpToTreePreviewHtml(curHwpDoc, { title: curName, rawBytes: curBytes });
        lastHtml = html;
        if (lastFrameUrl) { URL.revokeObjectURL(lastFrameUrl); lastFrameUrl = null; }
        frame.removeAttribute("srcdoc");
        lastFrameUrl = URL.createObjectURL(new Blob([html], { type: "text/html" }));
        frame.src = lastFrameUrl;
      } catch (e) {
        msg.className = "msg err"; msg.textContent = "✗ 미리보기 갱신 실패: " + (e?.message ?? e);
      }
    }
    showPreviewMode();
  });

  // 복원: 편집된 HTML + manifest → 원본 확장자 바이트 다운로드.
  // 직접편집(docx·csv)이면 iframe 의 #dl-edit, 아니면 편집기 박스에서 읽는다.
  restoreBtn.addEventListener("click", () => {
    // 한글: rhwp 문서에 편집 반영 → .hwp 입력은 네이티브 .hwp, .hwpx 입력은 .hwpx 로 다운로드.
    // (.hwp 는 exportHwp 시도 후 실패 시 .hwpx 폴백.)
    if (curHwpDoc) {
      try {
        const n = applyHwpEdits(curHwpDoc, editor.innerHTML);
        let out, ext = "hwpx";
        if (curFmt === "hwp" && typeof curHwpDoc.exportHwp === "function") {
          try { out = curHwpDoc.exportHwp(); ext = "hwp"; } catch { out = curHwpDoc.exportHwpx(); ext = "hwpx"; }
        } else {
          out = curHwpDoc.exportHwpx(); ext = "hwpx";
        }
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([out], { type: "application/octet-stream" }));
        a.download = curName.replace(/\.(hwp|hwpx)$/i, "") + "." + ext;
        a.click();
        URL.revokeObjectURL(a.href);
        msg.className = "msg ok"; msg.textContent = `✓ 복원 완료 — ${n}곳 반영, .${ext} 다운로드`;
      } catch (e) {
        msg.className = "msg err"; msg.textContent = "✗ 복원 실패: " + (e?.message ?? e);
      }
      return;
    }
    let editedHtml, manifest, format;
    if (directEdit) {
      const el = frame.contentDocument && frame.contentDocument.getElementById("dl-edit");
      if (!el) { msg.className = "msg err"; msg.textContent = "✗ 편집 영역을 찾지 못했습니다"; return; }
      editedHtml = el.innerHTML; manifest = directEdit.manifest; format = directEdit.format;
    } else {
      if (!curManifest) return;
      editedHtml = editor.innerHTML; manifest = curManifest; format = curFmt;
    }
    try {
      // .ppt(PowerPoint 97-2003)는 길이 변경 편집에 오프셋 재배치(전략 B)가 필요 → 옵트인 전달.
      // 다른 포맷은 이 옵션을 무시한다(.doc 는 별도 한계로 길이 변경 시 여전히 거부).
      const out = decode(editedHtml, manifest, { format, allowRelayout: true });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([out], { type: "application/octet-stream" }));
      a.download = curName.replace(/(\.[^.]+)?$/, (m) => m || "." + format);
      a.click();
      URL.revokeObjectURL(a.href);
      msg.className = "msg ok"; msg.textContent = "✓ 복원 완료 — 다운로드됨";
    } catch (e) {
      msg.className = "msg err"; msg.textContent = "✗ 복원 실패: " + (e?.message ?? e);
    }
  });

  // PDF 저장: iframe 안에서 수정한 글자(contenteditable span)를 모델에 반영 → 새 PDF 생성·다운로드
  savePdfBtn.addEventListener("click", () => {
    if (!pdfModel) return;
    try {
      const idoc = frame.contentDocument;
      if (idoc) {
        for (const sp of idoc.querySelectorAll('.pdf-t[data-pi]')) {
          const pi = +sp.getAttribute("data-pi"), ii = +sp.getAttribute("data-ii");
          const page = pdfModel.pages[pi];
          if (page && page.items[ii]) page.items[ii].text = sp.textContent ?? "";
        }
      }
      const out = buildPdfFromModel(pdfModel);
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([out], { type: "application/pdf" }));
      a.download = curName.replace(/(\.pdf)?$/i, "") + "_edited.pdf";
      a.click();
      URL.revokeObjectURL(a.href);
      msg.className = "msg ok"; msg.textContent = "✓ 새 PDF 저장 완료 — 다운로드됨";
    } catch (e) {
      msg.className = "msg err"; msg.textContent = "✗ PDF 생성 실패: " + (e?.message ?? e);
    }
  });

  // 더보기: 다음 PDF 페이지를 추가 추출해 iframe 미리보기 끝에 이어 붙인다(앞 페이지·편집 보존).
  morePagesBtn.addEventListener("click", () => {
    if (!pdfModel) return;
    const idoc = frame.contentDocument;
    const wrap = idoc && idoc.querySelector(".pdf-wrap");
    if (!wrap) return;
    const from = pdfModel.pages.length;
    const added = extendPdfModel(pdfModel, PDF_MORE_CHUNK);
    if (added === 0) { updateMorePagesBtn(); return; }
    // 새 페이지 [from, from+added) 만 조각 HTML 로 뽑아 DOM 끝에 삽입.
    const frag = pdfModelPagesHtml(pdfModel, from, from + added, { editable: true });
    wrap.insertAdjacentHTML("beforeend", frag);
    // 새 페이지가 새 임베디드 폰트를 쓸 수 있으니 @font-face 전체를 iframe <head> 에 갱신 주입.
    let faceStyle = idoc.getElementById("dl-pdf-faces");
    if (!faceStyle) { faceStyle = idoc.createElement("style"); faceStyle.id = "dl-pdf-faces"; idoc.head.appendChild(faceStyle); }
    faceStyle.textContent = pdfModelFontFaceCss(pdfModel);
    // 새로 붙인 페이지도 창 너비에 맞춰 축소(fit-to-width).
    try { frame.contentWindow.__pdfFit && frame.contentWindow.__pdfFit(); } catch {}
    updateMorePagesBtn();
  });

  // 화면 어디에 드래그해도 받기 (전체 페이지 드롭)
  // 신호: 드롭존 자체가 강조됨. 팝업이 열려 있어 드롭존이 가려질 때만 중앙 카드도 띄운다.
  let dragDepth = 0;
  function setDragging(on) {
    drop.classList.toggle("dragging", on);
    veil.classList.toggle("on", on && overlay.classList.contains("on"));
  }
  window.addEventListener("dragenter", (e) => {
    e.preventDefault();
    if (dragDepth++ === 0) setDragging(true);
  });
  window.addEventListener("dragover", (e) => e.preventDefault());
  window.addEventListener("dragleave", (e) => {
    e.preventDefault();
    if (--dragDepth <= 0) { dragDepth = 0; setDragging(false); }
  });
  window.addEventListener("drop", (e) => {
    e.preventDefault();
    dragDepth = 0; setDragging(false);
    handleFile(e.dataTransfer.files?.[0]);
  });
</script>
</body>
</html>
